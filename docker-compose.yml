version: "3.9"

# ─── Usage ────────────────────────────────────────────────────────────────────
#
# DEMO MODE (no Ollama needed — works right now):
#   docker-compose up --build
#   DEMO_MODE is true by default; agents run with pre-built analysis logic.
#
# FULL LLM MODE (requires Ollama image):
#   docker-compose --profile llm up --build
#   Pull the model inside Ollama after first start:
#     docker exec ollama ollama pull llama3.2
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Autonomous Incident Commander (FastAPI) ────────────────────────────────
  incident-commander:
    build: .
    container_name: incident-commander
    ports:
      - "8000:8000"
    environment:
      DEMO_MODE: "true"          # Set to false (and use --profile llm) for real LLM
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2
      MOCK_EMAIL: "true"
      ALERT_EMAIL: oncall@company.com
    restart: unless-stopped

  # ── Ollama (optional — only started with: docker-compose --profile llm up) ─
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles:
      - llm
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  ollama_models:
