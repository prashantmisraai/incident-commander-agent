AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Autonomous Incident Commander — ECS Fargate deployment.
  Creates VPC, subnets, security groups, ECR repo, ECS cluster, task definition, and service.

Parameters:
  ImageUri:
    Type: String
    Description: "ECR image URI, e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com/incident-commander:latest"
  AlertEmail:
    Type: String
    Description: "Email address to receive incident notifications"
  OllamaModel:
    Type: String
    Default: llama3.2
    Description: "Ollama model to load (must be pre-pulled into the volume)"
  MockEmail:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: "Set to true to log emails to stdout instead of sending"

Conditions:
  # True when ImageUri is the placeholder — used to set DesiredCount=0
  # so CloudFormation doesn't wait forever for tasks that can't start.
  IsPlaceholderImage: !Equals [!Ref ImageUri, "placeholder"]

Resources:

  # ── VPC ────────────────────────────────────────────────────────────────────
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags: [{Key: Name, Value: incident-commander-vpc}]

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetAssoc1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PublicSubnet1, RouteTableId: !Ref RouteTable}

  SubnetAssoc2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PublicSubnet2, RouteTableId: !Ref RouteTable}

  # ── Security Group ─────────────────────────────────────────────────────────
  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow inbound to Incident Commander API
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - {IpProtocol: tcp, FromPort: 8000, ToPort: 8000, CidrIp: 0.0.0.0/0}
      SecurityGroupEgress:
        - {IpProtocol: -1, CidrIp: 0.0.0.0/0}

  # ── ECR Repository ─────────────────────────────────────────────────────────
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: incident-commander
      ImageScanningConfiguration:
        ScanOnPush: true

  # ── ECS Cluster ────────────────────────────────────────────────────────────
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: incident-commander-cluster
      # CapacityProviders/DefaultCapacityProviderStrategy removed — they require
      # the ECS service-linked role to be fully propagated and cause
      # InvalidParameterException in regions where ECS hasn't been used before.
      # Fargate tasks work without declaring it at the cluster level.

  # ── IAM Roles ──────────────────────────────────────────────────────────────
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IncidentCommanderExecutionRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: ecs-tasks.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IncidentCommanderTaskRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: ecs-tasks.amazonaws.com}
            Action: sts:AssumeRole
      Policies:
        - PolicyName: IncidentCommanderPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [logs:CreateLogStream, logs:PutLogEvents]
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/incident-commander:*"

  # ── CloudWatch Log Group ───────────────────────────────────────────────────
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/incident-commander
      RetentionInDays: 14

  # ── ECS Task Definition ────────────────────────────────────────────────────
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: autonomous-incident-commander
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: "2048"
      Memory: "4096"
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: incident-commander
          Image: !Ref ImageUri
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp
          Environment:
            - {Name: OLLAMA_BASE_URL, Value: "http://localhost:11434"}
            - {Name: OLLAMA_MODEL,    Value: !Ref OllamaModel}
            - {Name: ALERT_EMAIL,     Value: !Ref AlertEmail}
            - {Name: MOCK_EMAIL,      Value: !Ref MockEmail}
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/incident-commander
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: incident-commander
          Essential: true

  # ── ECS Service ────────────────────────────────────────────────────────────
  ECSService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: incident-commander-service
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      # DesiredCount: 0 on the first deploy (ImageUri=placeholder).
      # After pushing a real image, redeploy with DesiredCount=1.
      DesiredCount: !If [IsPlaceholderImage, 0, 1]
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: [!Ref PublicSubnet1, !Ref PublicSubnet2]
          SecurityGroups: [!Ref AppSecurityGroup]
          AssignPublicIp: ENABLED

Outputs:
  ClusterName:
    Description: ECS Cluster name
    Value: !Ref ECSCluster
  ServiceName:
    Description: ECS Service name
    Value: !GetAtt ECSService.Name
  ECRRepository:
    Description: ECR repository URI
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/incident-commander"
